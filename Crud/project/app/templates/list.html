<h2>Blog Posts</h2>
<a href="{% url 'add_post' %}">Add Post</a>

{% for post in posts %}
    <div>
        <h3>{{ post.title }}</h3>
        <p>{{ post.content }}</p>
        <a href="{% url 'update_post' post.id %}">Edit</a>
        <a href="{% url 'delete_post' post.id %}">Delete</a>
    </div>
{% endfor %}

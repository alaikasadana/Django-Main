<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form & Search Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background: #4f46e5;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: #eef2ff;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    {% if not data %}
    <!-- ================= FORM SECTION ================= -->
    <h2>Submit Query</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="text" name="contact" placeholder="Contact Number" required>
        <textarea name="query" placeholder="Your Query" required></textarea>

        <button type="submit" name="submit_form">Submit</button>
    </form>

    <hr><br>

    <!-- ================= SEARCH SECTION ================= -->
    <h2>Search Data</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="search" placeholder="Search by name">
        <button type="submit" name="search_data">Search</button>
    </form>

    {% elif data %}
    <!-- ================= RESULT SECTION ================= -->
    <h2>Search Results</h2>

    {% for d in data %}
        <div class="result">
            <p><strong>Name:</strong> {{ d.name }}</p>
            <p><strong>Email:</strong> {{ d.email }}</p>
            <p><strong>Contact:</strong> {{ d.contact }}</p>
            <p><strong>Query:</strong> {{ d.query }}</p>
        </div>
    {% empty %}
        <p>No data found.</p>
    {% endfor %}

    {% endif %}

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Register Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        form {
            width: 320px;
            margin: 80px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        /* THIS IS IMPORTANT */
        .errorlist {
            color: red;
            list-style: none;
            padding: 0;
            margin: 5px 0;
        }
    </style>

</head>
<body>

<form action="" method="POST">
    {% csrf_token %}

    <label>Name :</label>
    {{ frm.name }}
    {{ frm.name.errors }}

    <label>Email :</label>
    {{ frm.email }}
    {{ frm.email.errors }}

    <label>Age :</label>
    {{ frm.age }}
    {{ frm.age.errors }}

    <label>City :</label>
    {{ frm.city }}
    {{ frm.city.errors }}

    <input type="submit" value="Submit">
</form>

</body>
</html>
